<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>行政周报看板</title>
<style>
  /* ─── Reset & Base ─── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; font-size: 14px; height: 100%; }
  body { height: 100%; display: flex; flex-direction: column; background: #F3F4F6; color: #111827; transition: background .2s, color .2s; }

  /* ─── Dark mode ─── */
  html.dark body { background: #121212; color: #F9FAFB; }
  html.dark .sidebar { background: #1F1F1F; border-color: #363636; }
  html.dark .topbar { background: #1F1F1F; border-color: #363636; }
  html.dark .card { background: #1F1F1F; border-color: #363636; }
  html.dark .card-section { border-color: #2a2a2a; }
  html.dark .group-header { background: #1a1a2e; border-color: #2d2d5e; }
  html.dark .week-btn { background: #2a2a2a; color: #9CA3AF; }
  html.dark .week-btn:hover { background: #363636; color: #F9FAFB; }
  html.dark .week-btn.active { background: #6C63FF; color: #fff; }
  html.dark .week-chip { background: #2a2a2a; color: #9CA3AF; }
  html.dark .search-input { background: #2a2a2a; border-color: #363636; color: #F9FAFB; }
  html.dark .search-input::placeholder { color: #6B7280; }
  html.dark .nav-item:hover { background: #2a2a2a; }
  html.dark .tag { background: #2a2a2a; }
  html.dark .section-label { color: #6B7280; }
  html.dark .expand-btn { color: #9CA3AF; }
  html.dark .expand-btn:hover { color: #F9FAFB; }
  html.dark .stat-box { background: #2a2a2a; }
  html.dark .modal-overlay { background: rgba(0,0,0,.7); }
  html.dark .modal { background: #1F1F1F; border-color: #363636; }
  html.dark .modal-section { border-color: #2a2a2a; }
  html.dark .person-avatar { border-color: #363636; }
  html.dark .empty-state { color: #6B7280; }

  /* ─── Layout ─── */
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: #fff; border-right: 1px solid #E5E7EB;
    display: flex; flex-direction: column; padding: 16px 12px;
    transition: width .25s, background .2s;
    overflow: hidden;
  }
  .sidebar.collapsed { width: 68px; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar {
    background: #fff; border-bottom: 1px solid #E5E7EB;
    padding: 12px 24px; display: flex; align-items: center; gap: 12px;
    flex-shrink: 0; transition: background .2s;
  }
  .content { flex: 1; overflow-y: auto; padding: 24px; }

  /* ─── Sidebar ─── */
  .sidebar-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; overflow: hidden; }
  .logo-icon {
    width: 36px; height: 36px; background: #6C63FF; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    color: #fff; font-size: 18px; font-weight: 700;
  }
  .logo-text { font-size: 15px; font-weight: 700; color: #111827; white-space: nowrap; overflow: hidden; }
  html.dark .logo-text { color: #F9FAFB; }
  .sidebar-collapse-btn {
    margin-left: auto; padding: 4px; border: none; background: none;
    cursor: pointer; color: #9CA3AF; border-radius: 6px; flex-shrink: 0;
  }
  .sidebar-collapse-btn:hover { background: #F3F4F6; color: #374151; }
  html.dark .sidebar-collapse-btn:hover { background: #2a2a2a; color: #F9FAFB; }
  .sidebar-section-label { font-size: 11px; font-weight: 600; color: #9CA3AF; text-transform: uppercase; letter-spacing: .05em; padding: 0 8px; margin: 12px 0 4px; white-space: nowrap; overflow: hidden; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px;
    cursor: pointer; color: #6B7280; font-weight: 500; transition: all .15s;
    text-decoration: none; white-space: nowrap; overflow: hidden;
  }
  .nav-item:hover { background: #F3F4F6; color: #111827; }
  .nav-item.active { background: #EEF2FF; color: #6C63FF; font-weight: 600; }
  html.dark .nav-item.active { background: #1e1b4b; color: #818cf8; }
  .nav-icon { width: 20px; height: 20px; flex-shrink: 0; }
  .sidebar-footer { margin-top: auto; padding-top: 12px; border-top: 1px solid #E5E7EB; }
  html.dark .sidebar-footer { border-color: #363636; }
  .user-info { display: flex; align-items: center; gap: 10px; padding: 8px 6px; overflow: hidden; }
  .user-avatar { width: 32px; height: 32px; background: #6C63FF; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 13px; flex-shrink: 0; }
  .user-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: #9CA3AF; white-space: nowrap; overflow: hidden; }

  /* ─── Topbar ─── */
  .topbar-title { font-size: 18px; font-weight: 700; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .search-input {
    padding: 7px 12px 7px 36px; border: 1px solid #E5E7EB; border-radius: 8px;
    background: #F9FAFB; font-size: 13px; width: 220px; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .search-input:focus { border-color: #6C63FF; box-shadow: 0 0 0 3px rgba(108,99,255,.12); }
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #9CA3AF; width: 16px; height: 16px; }
  .btn {
    padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 600; transition: all .15s; display: flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: #6C63FF; color: #fff; }
  .btn-primary:hover { background: #5a52d5; }
  .btn-ghost { background: transparent; color: #6B7280; border: 1px solid #E5E7EB; }
  html.dark .btn-ghost { border-color: #363636; color: #9CA3AF; }
  .btn-ghost:hover { background: #F3F4F6; }
  html.dark .btn-ghost:hover { background: #2a2a2a; }
  .icon-btn { padding: 8px; border-radius: 8px; border: none; background: none; cursor: pointer; color: #6B7280; }
  .icon-btn:hover { background: #F3F4F6; color: #374151; }
  html.dark .icon-btn:hover { background: #2a2a2a; color: #F9FAFB; }

  /* ─── Week switcher ─── */
  .week-switcher { display: flex; align-items: center; gap: 4px; }
  .week-btn {
    padding: 6px 14px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 500; background: #F3F4F6; color: #6B7280;
    transition: all .15s;
  }
  .week-btn:hover { background: #E5E7EB; color: #374151; }
  .week-btn.active { background: #6C63FF; color: #fff; font-weight: 600; }
  .week-arrow { padding: 6px; border-radius: 6px; border: none; background: none; cursor: pointer; color: #6B7280; }
  .week-arrow:hover { background: #E5E7EB; }
  html.dark .week-arrow:hover { background: #2a2a2a; }

  /* ─── Stats bar ─── */
  .stats-bar { display: flex; gap: 16px; margin-bottom: 24px; }
  .stat-box {
    background: #fff; border: 1px solid #E5E7EB; border-radius: 12px;
    padding: 14px 20px; flex: 1; display: flex; align-items: center; gap: 14px;
    transition: background .2s;
  }
  .stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .stat-icon.purple { background: #EEF2FF; color: #6C63FF; }
  .stat-icon.green { background: #ECFDF5; color: #059669; }
  .stat-icon.blue { background: #EFF6FF; color: #3B82F6; }
  .stat-icon.orange { background: #FFF7ED; color: #F59E0B; }
  .stat-value { font-size: 24px; font-weight: 700; line-height: 1; }
  .stat-label { font-size: 12px; color: #9CA3AF; margin-top: 4px; }

  /* ─── Group ─── */
  .group-block { margin-bottom: 32px; }
  .group-header {
    display: flex; align-items: center; gap: 10px;
    background: #F0EEFF; border: 1px solid #DDD6FE; border-radius: 10px;
    padding: 10px 16px; margin-bottom: 16px;
  }
  .group-dot { width: 10px; height: 10px; border-radius: 50%; background: #6C63FF; }
  .group-name { font-size: 15px; font-weight: 700; color: #5b4ee8; }
  html.dark .group-name { color: #818cf8; }
  .group-count { font-size: 12px; color: #9CA3AF; background: #E0E7FF; padding: 2px 8px; border-radius: 20px; margin-left: auto; }
  html.dark .group-count { background: #1e1b4b; color: #818cf8; }

  /* ─── Cards grid ─── */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; }

  /* ─── Person card ─── */
  .card {
    background: #fff; border: 1px solid #E5E7EB; border-radius: 12px;
    overflow: hidden; transition: box-shadow .2s, border-color .2s;
  }
  .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.08); border-color: #C4B5FD; }
  html.dark .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.3); border-color: #4f46e5; }
  .card-header { padding: 14px 16px 12px; display: flex; align-items: flex-start; gap: 12px; border-bottom: 1px solid #F3F4F6; }
  html.dark .card-header { border-color: #2a2a2a; }
  .person-avatar {
    width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px; color: #fff;
  }
  .person-info { flex: 1; min-width: 0; }
  .person-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .person-module { font-size: 12px; color: #6B7280; line-height: 1.4; }
  .support-exec-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: #FEF3C7; color: #92400E; font-size: 11px; font-weight: 600;
    padding: 3px 8px; border-radius: 20px; margin-top: 5px; white-space: nowrap;
  }
  html.dark .support-exec-badge { background: #451a03; color: #fcd34d; }

  /* Card sections */
  .card-body { padding: 0; }
  .card-section { border-bottom: 1px solid #F3F4F6; }
  .card-section:last-child { border-bottom: none; }
  .section-head {
    display: flex; align-items: center; gap: 8px; padding: 10px 16px;
    cursor: pointer; user-select: none;
  }
  .section-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .dot-blue { background: #3B82F6; }
  .dot-gray { background: #9CA3AF; }
  .dot-green { background: #10B981; }
  .dot-orange { background: #F59E0B; }
  .section-label { font-size: 12px; font-weight: 600; color: #6B7280; flex: 1; }
  .section-content { padding: 0 16px 12px; font-size: 13px; line-height: 1.7; color: #374151; white-space: pre-wrap; }
  html.dark .section-content { color: #D1D5DB; }
  .section-chevron { width: 16px; height: 16px; color: #9CA3AF; transition: transform .2s; flex-shrink: 0; }
  .section-chevron.open { transform: rotate(180deg); }

  /* Primary section (always visible) */
  .primary-section { padding: 12px 16px; }
  .primary-label { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .primary-label-text { font-size: 12px; font-weight: 600; color: #3B82F6; }
  .primary-content { font-size: 13px; line-height: 1.75; color: #374151; white-space: pre-wrap; }
  html.dark .primary-content { color: #D1D5DB; }

  /* Expand controls */
  .expand-bar {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 8px 16px 10px; cursor: pointer; color: #6B7280; font-size: 12px; font-weight: 500;
    border-top: 1px dashed #E5E7EB; transition: color .15s;
  }
  html.dark .expand-bar { border-color: #363636; }
  .expand-bar:hover { color: #6C63FF; }

  /* ─── Modal ─── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border: 1px solid #E5E7EB; border-radius: 16px;
    width: 680px; max-width: calc(100vw - 40px); max-height: 85vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid #F3F4F6; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  html.dark .modal-header { border-color: #2a2a2a; }
  .modal-title { font-size: 18px; font-weight: 700; flex: 1; }
  .modal-close { padding: 6px; border: none; background: none; cursor: pointer; color: #9CA3AF; border-radius: 6px; }
  .modal-close:hover { background: #F3F4F6; color: #374151; }
  html.dark .modal-close:hover { background: #2a2a2a; }
  .modal-body { overflow-y: auto; padding: 20px 24px; flex: 1; }
  .modal-section { margin-bottom: 20px; }
  .modal-section-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .modal-section-body { font-size: 13px; line-height: 1.8; color: #374151; white-space: pre-wrap; background: #F9FAFB; padding: 12px 14px; border-radius: 8px; border: 1px solid #E5E7EB; }
  html.dark .modal-section-body { color: #D1D5DB; background: #2a2a2a; border-color: #363636; }
  .modal-section-body.empty { color: #9CA3AF; font-style: italic; }

  /* ─── Empty state ─── */
  .empty-state { text-align: center; padding: 60px 20px; color: #9CA3AF; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
  .empty-sub { font-size: 13px; }

  /* ─── Scrollbar ─── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
  html.dark ::-webkit-scrollbar-thumb { background: #363636; }

  /* ─── Tooltip ─── */
  .tooltip-wrap { position: relative; }
  .tooltip {
    display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: #1F2937; color: #F9FAFB; font-size: 11px; padding: 4px 8px; border-radius: 6px;
    white-space: nowrap; pointer-events: none; z-index: 50;
  }
  .tooltip-wrap:hover .tooltip { display: block; }

  /* ─── Filter bar ─── */
  .filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-chip {
    padding: 5px 12px; border-radius: 20px; border: 1px solid #E5E7EB;
    font-size: 12px; font-weight: 500; cursor: pointer; background: #fff; color: #6B7280;
    transition: all .15s;
  }
  html.dark .filter-chip { background: #2a2a2a; border-color: #363636; color: #9CA3AF; }
  .filter-chip:hover { border-color: #6C63FF; color: #6C63FF; }
  .filter-chip.active { background: #6C63FF; border-color: #6C63FF; color: #fff; }

  /* responsive */
  @media (max-width: 768px) {
    .cards-grid { grid-template-columns: 1fr; }
    .stats-bar { flex-wrap: wrap; }
    .stat-box { flex: 1 1 45%; }
    .sidebar { width: 68px; }
    .sidebar .logo-text, .sidebar .nav-item span, .sidebar .user-name, .sidebar .user-role { display: none; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- ─── Sidebar ─── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">行</div>
      <span class="logo-text">行政周报</span>
      <button class="sidebar-collapse-btn" onclick="toggleSidebar()" id="collapseBtn" title="收起">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
    </div>

    <div class="sidebar-section-label">导航</div>
    <nav>
      <a class="nav-item active" onclick="setView('weekly')" href="#">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>周报看板</span>
      </a>
      <a class="nav-item" onclick="setView('person')" href="#">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>人员视图</span>
      </a>
      <a class="nav-item" onclick="setView('history')" href="#">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>历史周报</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">管</div>
        <div>
          <div class="user-name">耿博琳</div>
          <div class="user-role">大行政</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ─── Main ─── -->
  <div class="main">
    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-title" id="topbarTitle">2026.6.11 行政周报</div>
      <div class="week-switcher">
        <button class="week-arrow" onclick="prevWeek()" title="上一期">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="week-btn" onclick="switchWeek(0)">4.16</button>
        <button class="week-btn" onclick="switchWeek(1)">5.28</button>
        <button class="week-btn active" id="weekBtn2" onclick="switchWeek(2)">6.11</button>
        <button class="week-arrow" onclick="nextWeek()" title="下一期">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="topbar-right">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" type="text" placeholder="搜索人员或内容…" id="searchInput" oninput="onSearch()" />
        </div>
        <button class="btn btn-ghost icon-btn tooltip-wrap" onclick="toggleDark()" title="切换主题">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIcon"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>

    <!-- Content -->
    <div class="content" id="mainContent">
      <!-- Rendered by JS -->
    </div>
  </div>
</div>

<!-- ─── Detail Modal ─── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="person-avatar" id="modalAvatar" style="width:44px;height:44px;border-radius:12px;font-size:18px;"></div>
      <div>
        <div class="modal-title" id="modalName"></div>
        <div style="font-size:12px;color:#9CA3AF;" id="modalModule"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// DATA — extracted from Excel 行政工作周报
// ─────────────────────────────────────────────
const WEEKS = [
  { label: '2026.4.16', short: '4.16' },
  { label: '2026.5.28', short: '5.28' },
  { label: '2026.6.11', short: '6.11' },
];

const REPORT_DATA = [
  // ─── week 0: 2026.4.16 ───
  [

// ─────────────────────────────────────────────
let currentWeek = 2;
let searchQuery = '';
let sidebarCollapsed = false;
let expandedCards = {};
const AVATAR_COLORS = ['#6C63FF','#10B981','#3B82F6','#F59E0B','#EF4444','#8B5CF6','#EC4899','#14B8A6','#F97316','#6366F1'];

function avatarColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xFFFF;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}
function initial(name) { return name ? name[0] : '?'; }

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render() {
  const data = REPORT_DATA[currentWeek];
  const q = searchQuery.toLowerCase();
  const filtered = q ? data.filter(p =>
    p.name.includes(q) || p.module.includes(q) ||
    p.weekly3.toLowerCase().includes(q) || p.daily.toLowerCase().includes(q)
  ) : data;

  // Stats
  const groups = [...new Set(data.map(p => p.group))];
  const totalPeople = data.length;
  const withSupport = data.filter(p => p.supportExec && p.supportExec !== '/').length;

  let html = `
    <div class="stats-bar">
      <div class="stat-box">
        <div class="stat-icon purple">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>

          <div class="stat-value">${totalPeople}</div>
          <div class="stat-label">参与人员</div>
        </div>
      </div>
      <div class="stat-box">
        <div class="stat-icon green">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <div>
          <div class="stat-value">${groups.length}</div>
          <div class="stat-label">行政模块</div>
        </div>
      </div>
      <div class="stat-box">
        <div class="stat-icon blue">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div>
          <div class="stat-value">${withSupport}</div>
          <div class="stat-label">高管支持</div>
        </div>
      </div>
      <div class="stat-box">
        <div class="stat-icon orange">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </div>
        <div>
          <div class="stat-value">${filtered.length}</div>
          <div class="stat-label">${q ? '搜索结果' : '当周完整汇报'}</div>
        </div>
      </div>
    </div>
  `;

  if (filtered.length === 0) {
    html += `<div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">未找到匹配内容</div>
      <div class="empty-sub">尝试其他关键词</div>
    </div>`;
  } else {
    for (const group of groups) {
      const members = filtered.filter(p => p.group === group);
      if (!members.length) continue;
      html += `
        <div class="group-block">
          <div class="group-header">
            <div class="group-dot"></div>
            <div class="group-name">${group}</div>
            <div class="group-count">${members.length} 人</div>
          </div>
          <div class="cards-grid">
            ${members.map(p => renderCard(p)).join('')}
          </div>
        </div>
      `;
    }
  }

  document.getElementById('mainContent').innerHTML = html;
}

function renderCard(p) {
  const color = avatarColor(p.name);
  const cardId = `${currentWeek}_${p.name}`;
  const isExpanded = expandedCards[cardId];

  const hasDailyOrMore = p.daily || p.next3 || p.issues;

  return `
    <div class="card" id="card_${cardId}">
      <div class="card-header">
        <div class="person-avatar" style="background:${color};">${initial(p.name)}</div>
        <div class="person-info">
          <div class="person-name">${p.name}</div>
          <div class="person-module">${p.module.replace(/\n/g,'  ·  ')}</div>
          ${p.supportExec && p.supportExec !== '/' ?
            `<div class="support-exec-badge">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              ${p.supportExec.replace(/\n/g,' / ')}
            </div>` : ''}
        </div>
        <button onclick="openModal('${p.name}', ${currentWeek})" style="flex-shrink:0;padding:6px;border:none;background:none;cursor:pointer;color:#9CA3AF;border-radius:6px;" title="查看详情">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </button>
      </div>
      <div class="card-body">
        <div class="primary-section">
          <div class="primary-label">
            <div class="section-dot dot-blue"></div>
            <span class="primary-label-text">本周重点 3 件事</span>
          </div>
          <div class="primary-content">${truncate(p.weekly3, isExpanded ? 99999 : 240)}</div>
          ${p.weekly3.length > 240 && !isExpanded ? `<div style="margin-top:6px;font-size:12px;color:#6C63FF;cursor:pointer;" onclick="toggleExpand('${cardId}')">展开全部 ▾</div>` : ''}
          ${p.weekly3.length > 240 && isExpanded ? `<div style="margin-top:6px;font-size:12px;color:#6C63FF;cursor:pointer;" onclick="toggleExpand('${cardId}')">收起 ▴</div>` : ''}
        </div>

        ${hasDailyOrMore && isExpanded ? `
          ${p.daily ? renderSection('日常事务性工作', p.daily, 'dot-gray', cardId) : ''}
          ${p.next3 ? renderSection('下周重点 3 件事', p.next3, 'dot-green', cardId) : ''}
          ${p.issues ? renderSection('问题及跨部门协同', p.issues, 'dot-orange', cardId) : ''}
        ` : ''}
      </div>

      ${hasDailyOrMore ? `
        <div class="expand-bar" onclick="toggleExpand('${cardId}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transform:${isExpanded ? 'rotate(180deg)' : 'rotate(0)'};transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>
          ${isExpanded ? '收起其他字段' : '展开日常 / 下周 / 问题'}
        </div>
      ` : ''}
    </div>
  `;
}

function renderSection(label, content, dotClass, cardId) {
  return `
    <div class="card-section" style="padding:10px 16px 12px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
        <div class="section-dot ${dotClass}"></div>
        <span class="section-label">${label}</span>
      </div>
      <div class="section-content">${content}</div>
    </div>
  `;
}

function truncate(str, len) {
  if (!str) return '暂无填写';
  if (str.length <= len) return str;
  return str.slice(0, len) + '…';
}

// ─── INTERACTIONS ───
function toggleExpand(cardId) {
  expandedCards[cardId] = !expandedCards[cardId];
  render();
}

function switchWeek(idx) {
  currentWeek = idx;
  document.querySelectorAll('.week-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.getElementById('topbarTitle').textContent = `${WEEKS[idx].label} 行政周报`;
  expandedCards = {};
  render();
}

function prevWeek() { if (currentWeek > 0) switchWeek(currentWeek - 1); }
function nextWeek() { if (currentWeek < WEEKS.length - 1) switchWeek(currentWeek + 1); }

function onSearch() {
  searchQuery = document.getElementById('searchInput').value;
  render();
}

function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  const s = document.getElementById('sidebar');
  s.classList.toggle('collapsed', sidebarCollapsed);
  const btn = document.getElementById('collapseBtn');
  btn.innerHTML = sidebarCollapsed
    ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>`
    : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>`;
}

function setView(v) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  // In prototype, all views show same data; just update title
  const titles = { weekly: '周报看板', person: '人员视图', history: '历史周报' };
  // keep rendering the weekly view for now
}

  const isDark = document.documentElement.classList.toggle('dark');

}

// ─── MODAL ───
function openModal(name, weekIdx) {
  const p = REPORT_DATA[weekIdx].find(x => x.name === name);
  if (!p) return;
  const color = avatarColor(p.name);

  document.getElementById('modalAvatar').style.background = color;
  document.getElementById('modalAvatar').textContent = initial(p.name);
  document.getElementById('modalName').textContent = `${p.name}   —   ${WEEKS[weekIdx].label}`;
  document.getElementById('modalModule').textContent = p.module.replace(/\n/g, ' · ');

  const renderMField = (label, content, dotClass, textColor) => {
    const empty = !content || content === '/';
    return `
      <div class="modal-section">
        <div class="modal-section-title" style="color:${textColor}">
          <div class="section-dot ${dotClass}"></div>${label}
        </div>
        <div class="modal-section-body${empty ? ' empty' : ''}">${empty ? '本期暂无填写' : content}</div>
      </div>
    `;
  };

  let body = '';
  if (p.supportExec && p.supportExec !== '/') {
    body += `<div style="margin-bottom:16px;padding:10px 14px;background:#FEF3C7;border-radius:8px;font-size:13px;">
      <span style="font-weight:600;color:#92400E;">支持高管：</span>
      <span style="color:#78350F;">${p.supportExec.replace(/\n/g,' / ')}</span>
    </div>`;
  }
  body += renderMField('本周重点 3 件事', p.weekly3, 'dot-blue', '#3B82F6');
  body += renderMField('日常事务性工作', p.daily, 'dot-gray', '#6B7280');
  body += renderMField('下周重点 3 件事', p.next3, 'dot-green', '#10B981');
  body += renderMField('问题及跨部门协同', p.issues, 'dot-orange', '#F59E0B');

  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─── INIT ───
render();
</script>
</body>
</html>
