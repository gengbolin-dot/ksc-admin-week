<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>行政周报看板 v2</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-family:'Inter','PingFang SC','Microsoft YaHei',sans-serif;font-size:14px;height:100%;}
body{height:100%;display:flex;flex-direction:column;background:#F3F4F6;color:#111827;transition:background .2s,color .2s;}
/* dark */
html.dark body{background:#121212;color:#F9FAFB;}
html.dark .sidebar{background:#1F1F1F;border-color:#363636;}
html.dark .topbar{background:#1F1F1F;border-color:#363636;}
html.dark .card,.dark-card{background:#1F1F1F;border-color:#363636;}
html.dark .gh{background:#1a1a2e;border-color:#2d2d5e;}
html.dark .week-btn{background:#2a2a2a;color:#9CA3AF;}
html.dark .week-btn.active{background:#6C63FF;color:#fff;}
html.dark .search-input{background:#2a2a2a;border-color:#363636;color:#F9FAFB;}
html.dark .search-input::placeholder{color:#6B7280;}
html.dark .nav-item:hover{background:#2a2a2a;}
html.dark .nav-item.active{background:#1e1b4b;color:#818cf8;}
html.dark .stat-box{background:#2a2a2a;}
html.dark .modal-bg{background:rgba(0,0,0,.75);}
html.dark .modal{background:#1F1F1F;border-color:#363636;}
html.dark .person-list-item{border-color:#2a2a2a;}
html.dark .person-list-item:hover{background:#252525;}
html.dark .person-list-item.active{background:#1e1b4b;border-color:#6C63FF;}
html.dark .timeline-entry{border-color:#2a2a2a;background:#252525;}
html.dark .proj-card{background:#252525;border-color:#363636;}
html.dark .proj-card:hover{border-color:#6C63FF;}
html.dark .quarter-header{background:#1a1a2e;border-color:#2d2d5e;color:#818cf8;}
html.dark .filter-select{background:#2a2a2a;border-color:#363636;color:#F9FAFB;}
html.dark input,html.dark textarea,html.dark select{background:#2a2a2a;border-color:#363636;color:#F9FAFB;}
html.dark .chip{background:#2a2a2a;color:#9CA3AF;}
html.dark .chip.active{background:#1e1b4b;color:#818cf8;border-color:#6C63FF;}
html.dark .tag-sm{background:#2a2a2a;}
html.dark .divider{border-color:#2a2a2a;}
html.dark .empty{color:#6B7280;}
/* layout */
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:220px;flex-shrink:0;background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;padding:16px 12px;transition:width .25s;overflow:hidden;}
.sidebar.collapsed{width:68px;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap;}
.content{flex:1;overflow-y:auto;padding:20px;}
/* sidebar */
.logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:20px;overflow:hidden;}
.logo-icon{width:36px;height:36px;background:#6C63FF;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-size:17px;font-weight:700;}
.logo-text{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;}
html.dark .logo-text{color:#F9FAFB;}
.collapse-btn{margin-left:auto;padding:4px;border:none;background:none;cursor:pointer;color:#9CA3AF;border-radius:6px;flex-shrink:0;}
.collapse-btn:hover{background:#F3F4F6;}
html.dark .collapse-btn:hover{background:#2a2a2a;}
.nav-section{font-size:11px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:.05em;padding:0 8px;margin:12px 0 4px;white-space:nowrap;overflow:hidden;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;color:#6B7280;font-weight:500;transition:all .15s;text-decoration:none;white-space:nowrap;overflow:hidden;}
.nav-item:hover{background:#F3F4F6;color:#111827;}
.nav-item.active{background:#EEF2FF;color:#6C63FF;font-weight:600;}
.nav-icon{width:20px;height:20px;flex-shrink:0;}
.sidebar-footer{margin-top:auto;padding-top:12px;border-top:1px solid #E5E7EB;}
html.dark .sidebar-footer{border-color:#363636;}
.user-wrap{display:flex;align-items:center;gap:10px;padding:6px;overflow:hidden;}
.user-av{width:32px;height:32px;background:#6C63FF;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0;}
.user-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-role{font-size:11px;color:#9CA3AF;}
/* topbar */
.topbar-title{font-size:17px;font-weight:700;}
.week-switcher{display:flex;align-items:center;gap:4px;}
.week-btn{padding:5px 12px;border-radius:7px;border:none;background:#F3F4F6;color:#6B7280;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;}
.week-btn.active{background:#6C63FF;color:#fff;}
.week-arr{padding:5px;border:none;background:none;cursor:pointer;color:#9CA3AF;border-radius:6px;}
.week-arr:hover{background:#F3F4F6;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.search-wrap{position:relative;}
.search-input{padding:7px 12px 7px 34px;border:1px solid #E5E7EB;border-radius:8px;background:#F9FAFB;font-size:13px;width:200px;outline:none;transition:border-color .15s;}
.search-input:focus{border-color:#6C63FF;box-shadow:0 0 0 3px rgba(108,99,255,.1);}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9CA3AF;}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:all .15s;}
.btn-primary{background:#6C63FF;color:#fff;}
.btn-primary:hover{background:#5a52e8;}
.btn-ghost{background:transparent;color:#6B7280;}
.btn-ghost:hover{background:#F3F4F6;color:#111827;}
html.dark .btn-ghost:hover{background:#2a2a2a;color:#F9FAFB;}
.btn-danger{background:#FEE2E2;color:#DC2626;}
.btn-danger:hover{background:#FECACA;}
/* stats */
.stats-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.stat-box{background:#fff;border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;flex:1;min-width:140px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.stat-icon.purple{background:#EEF2FF;color:#6C63FF;}
.stat-icon.green{background:#ECFDF5;color:#10B981;}
.stat-icon.orange{background:#FFF7ED;color:#F97316;}
.stat-icon.blue{background:#EFF6FF;color:#3B82F6;}
.stat-value{font-size:22px;font-weight:700;}
.stat-label{font-size:12px;color:#9CA3AF;margin-top:1px;}
/* chips filter */
.chips-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.chip{padding:5px 12px;border-radius:20px;border:1px solid #E5E7EB;background:#fff;color:#6B7280;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;user-select:none;}
.chip:hover{border-color:#6C63FF;color:#6C63FF;}
.chip.active{background:#EEF2FF;border-color:#6C63FF;color:#6C63FF;font-weight:600;}
/* group header */
.gh{background:#EEF2FF;border:1px solid #C7D2FE;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.gh-title{font-weight:700;color:#4338CA;font-size:14px;}
.gh-count{font-size:12px;color:#6C63FF;background:#fff;padding:2px 8px;border-radius:10px;margin-left:4px;}
.gh-arrow{margin-left:auto;color:#6C63FF;transition:transform .2s;}
.gh-arrow.open{transform:rotate(180deg);}
/* person cards grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;margin-bottom:20px;}
.card{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:box-shadow .15s;}
.card:hover{box-shadow:0 4px 12px rgba(108,99,255,.1);}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0;}
.card-name{font-weight:700;font-size:14px;}
.card-module{font-size:11px;color:#9CA3AF;margin-top:1px;}
.tag-sm{display:inline-block;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:500;background:#F3F4F6;color:#6B7280;margin-right:4px;margin-bottom:2px;}
.section-row{margin-top:10px;border-top:1px solid #F3F4F6;padding-top:8px;}
html.dark .section-row{border-color:#2a2a2a;}
.section-label{font-size:11px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.section-text{font-size:12px;line-height:1.6;color:#374151;white-space:pre-line;max-height:80px;overflow:hidden;mask-image:linear-gradient(to bottom,#000 60%,transparent 100%);}
html.dark .section-text{color:#D1D5DB;}
.expand-btn{font-size:11px;color:#6C63FF;cursor:pointer;margin-top:4px;display:inline-flex;align-items:center;gap:3px;}
.expand-btn:hover{text-decoration:underline;}
/* personal view */
.personal-layout{display:flex;gap:16px;height:calc(100vh - 120px);}
.person-list{width:200px;flex-shrink:0;background:#fff;border:1px solid #E5E7EB;border-radius:12px;overflow-y:auto;}
html.dark .person-list{background:#1F1F1F;border-color:#363636;}
.person-list-item{padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid #F3F4F6;transition:background .15s;}
.person-list-item:hover{background:#F9FAFB;}
.person-list-item.active{background:#EEF2FF;border-left:3px solid #6C63FF;}
.person-detail{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;}
.personal-stats{display:flex;gap:12px;flex-shrink:0;}
.personal-stat{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:14px 18px;flex:1;display:flex;align-items:center;gap:12px;}
html.dark .personal-stat{background:#1F1F1F;border-color:#363636;}
.timeline-wrap{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:16px;flex:1;}
html.dark .timeline-wrap{background:#1F1F1F;border-color:#363636;}
.timeline-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.timeline-entry{border:1px solid #E5E7EB;border-radius:10px;padding:14px;margin-bottom:10px;background:#FAFAFA;}
.timeline-week{font-size:12px;font-weight:700;color:#6C63FF;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.timeline-week::before{content:'';display:inline-block;width:8px;height:8px;background:#6C63FF;border-radius:50%;}
.timeline-section{margin-top:8px;}
.timeline-section-label{font-size:11px;font-weight:600;color:#9CA3AF;text-transform:uppercase;margin-bottom:4px;}
.timeline-text{font-size:12px;line-height:1.6;color:#374151;white-space:pre-line;}
html.dark .timeline-text{color:#D1D5DB;}
/* annual projects */
.annual-toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.filter-select{padding:6px 10px;border:1px solid #E5E7EB;border-radius:8px;background:#fff;font-size:13px;outline:none;color:#374151;cursor:pointer;}
.filter-select:focus{border-color:#6C63FF;}
.quarter-section{margin-bottom:20px;}
.quarter-header{background:#EEF2FF;border:1px solid #C7D2FE;border-radius:10px;padding:10px 16px;display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer;user-select:none;}
.quarter-label{font-weight:700;color:#4338CA;font-size:14px;}
.quarter-count{font-size:12px;color:#6C63FF;background:#fff;padding:2px 8px;border-radius:10px;}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}
.proj-card{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:14px;cursor:pointer;transition:all .15s;position:relative;}
.proj-card:hover{box-shadow:0 4px 14px rgba(108,99,255,.12);border-color:#A5B4FC;}
.proj-name{font-weight:700;font-size:13px;margin-bottom:6px;padding-right:24px;}
.proj-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;}
.badge-planned{background:#F3F4F6;color:#6B7280;}
.badge-doing{background:#DBEAFE;color:#1D4ED8;}
.badge-done{background:#D1FAE5;color:#065F46;}
.badge-paused{background:#FEF3C7;color:#92400E;}
.badge-p0{background:#FEE2E2;color:#991B1B;}
.badge-p1{background:#FFF7ED;color:#9A3412;}
.badge-p2{background:#F3F4F6;color:#6B7280;}
.proj-owner{font-size:12px;color:#6B7280;display:flex;align-items:center;gap:4px;}
.proj-progress{font-size:12px;color:#6B7280;line-height:1.5;margin-top:6px;border-top:1px solid #F3F4F6;padding-top:6px;}
html.dark .proj-progress{border-color:#2a2a2a;}
.proj-actions{position:absolute;top:10px;right:10px;display:flex;gap:4px;opacity:0;transition:opacity .15s;}
.proj-card:hover .proj-actions{opacity:1;}
.icon-btn{width:26px;height:26px;border-radius:6px;border:none;background:#F3F4F6;color:#6B7280;cursor:pointer;display:flex;align-items:center;justify-content:center;}
html.dark .icon-btn{background:#363636;color:#9CA3AF;}
.icon-btn:hover{background:#EEF2FF;color:#6C63FF;}
.icon-btn.del:hover{background:#FEE2E2;color:#DC2626;}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;}
.modal-bg.hidden{display:none;}
.modal{background:#fff;border-radius:16px;padding:24px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.modal-title{font-size:16px;font-weight:700;flex:1;}
.modal-close{width:32px;height:32px;border-radius:8px;border:none;background:none;cursor:pointer;color:#9CA3AF;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:#F3F4F6;color:#111827;}
html.dark .modal-close:hover{background:#2a2a2a;color:#F9FAFB;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:600;color:#6B7280;margin-bottom:6px;display:block;}
.form-input{width:100%;padding:8px 12px;border:1px solid #E5E7EB;border-radius:8px;font-size:13px;outline:none;font-family:inherit;}
.form-input:focus{border-color:#6C63FF;box-shadow:0 0 0 3px rgba(108,99,255,.1);}
.form-row{display:flex;gap:10px;}
.form-row .form-group{flex:1;}
textarea.form-input{resize:vertical;min-height:70px;}
.form-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;border-top:1px solid #E5E7EB;padding-top:16px;}
html.dark .form-footer{border-color:#363636;}
/* detail modal */
.dm-section{margin-top:14px;border-top:1px solid #E5E7EB;padding-top:12px;}
html.dark .dm-section{border-color:#363636;}
.dm-label{font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;margin-bottom:6px;}
.dm-text{font-size:13px;line-height:1.7;white-space:pre-line;color:#374151;}
html.dark .dm-text{color:#D1D5DB;}
/* quarter multi-select */
.q-checks{display:flex;gap:8px;flex-wrap:wrap;}
.q-check{padding:5px 12px;border:1px solid #E5E7EB;border-radius:7px;cursor:pointer;font-size:13px;user-select:none;transition:all .15s;}
.q-check.selected{background:#EEF2FF;border-color:#6C63FF;color:#6C63FF;font-weight:600;}
.empty{text-align:center;padding:48px 20px;color:#9CA3AF;font-size:14px;}
.divider{border:none;border-top:1px solid #E5E7EB;margin:16px 0;}
</style>
</head>
<body>
<div class="app">
<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="logo-wrap">
    <div class="logo-icon">行</div>
    <span class="logo-text">行政周报看板</span>
    <button class="collapse-btn" onclick="toggleSidebar()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
  </div>
  <div class="nav-section">视图</div>
  <nav id="nav">
    <a class="nav-item active" id="nav-kanban" onclick="setView('kanban')" href="#">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span>周报看板</span>
    </a>
    <a class="nav-item" id="nav-personal" onclick="setView('personal')" href="#">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>个人视图</span>
    </a>
    <a class="nav-item" id="nav-annual" onclick="setView('annual')" href="#">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h7v7H3z"/><path d="M14 3h7v7h-7z"/><path d="M14 14h7v7h-7z"/><path d="M3 14h7v7H3z"/></svg>
      <span>年度项目</span>
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-wrap">
      <div class="user-av">管</div>
      <div>
        <div class="user-name">耿博琳</div>
        <div class="user-role">大行政</div>
      </div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar" id="topbar">
    <div class="topbar-title" id="topbar-title">2026.6.11 行政周报</div>
    <div class="week-switcher" id="week-switcher">
      <button class="week-arr" onclick="prevWeek()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
      <button class="week-btn" id="wb0" onclick="switchWeek(0)">4.16</button>
      <button class="week-btn" id="wb1" onclick="switchWeek(1)">5.28</button>
      <button class="week-btn active" id="wb2" onclick="switchWeek(2)">6.11</button>
      <button class="week-arr" onclick="nextWeek()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>
    <div class="topbar-right">
      <div class="search-wrap">
        <svg class="search-ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="searchInput" type="text" placeholder="搜索内容…" oninput="onSearch()" />
      </div>
      <button class="btn btn-ghost" onclick="toggleDark()" style="padding:7px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIcon"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>
</div>

<!-- Project modal -->
<div class="modal-bg hidden" id="projModal" onclick="closeProjModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="projModalTitle">新建项目</div>
      <button class="modal-close" onclick="closeProjModal()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label class="form-label">项目名称 *</label>
        <input class="form-input" id="pf-name" type="text" placeholder="项目名称" />
      </div>
      <div class="form-group">
        <label class="form-label">优先级</label>
        <select class="form-input" id="pf-priority">
          <option>P0</option><option>P1</option><option>P2</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">

function aColor(n){let h=0;for(let i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))&0xFFFF;return ACOLORS[h%ACOLORS.length];}
function ini(n){return n?n[0]:'?';}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function statusBadge(s){const m={'规划中':'badge-planned','进行中':'badge-doing','已完成':'badge-done','暂停':'badge-paused'};return`<span class="badge ${m[s]||'badge-planned'}">${s}</span>`;}

// ─── VIEW ROUTER ───
function setView(v){
  currentView=v;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-'+v).classList.add('active');
  const ws=document.getElementById('week-switcher');
  ws.style.display=v==='kanban'?'flex':'none';
  document.getElementById('topbar-title').textContent=
    v==='kanban'?WEEKS[currentWeek].label+' 行政周报':v==='personal'?'个人视图':'年度项目';
  document.getElementById('searchInput').value='';
  searchQ='';filterPerson='';
  render();
  return false;
}

function render(){
  if(currentView==='kanban')renderKanban();
  else if(currentView==='personal')renderPersonal();
  else renderAnnual();
}

// ─── KANBAN VIEW ───
function renderKanban(){
  const data=REPORT_DATA[currentWeek];
  const q=searchQ.toLowerCase();
  let filtered=q?data.filter(p=>p.name.includes(q)||p.module.includes(q)||p.weekly3.toLowerCase().includes(q)||p.daily.toLowerCase().includes(q)):data;
  if(filterPerson)filtered=filtered.filter(p=>p.name===filterPerson);
  const allPeople=[...new Set(data.map(p=>p.name))];
  const groups=[...new Set(data.map(p=>p.group))];
  const withSupport=data.filter(p=>p.supportExec&&p.supportExec!=='/').length;
  let html=`<div class="stats-bar">
    <div class="stat-box"><div class="stat-icon purple">${svgPeople()}</div><div><div class="stat-value">${data.length}</div><div class="stat-label">参与人员</div></div></div>
    <div class="stat-box"><div class="stat-icon green">${svgCalc()}</div><div><div class="stat-value">${groups.length}</div><div class="stat-label">行政模块</div></div></div>
    <div class="stat-box"><div class="stat-icon orange">${svgStar()}</div><div><div class="stat-value">${withSupport}</div><div class="stat-label">高管支持</div></div></div>
    <div class="stat-box"><div class="stat-icon blue">${svgDoc()}</div><div><div class="stat-value">${WEEKS.length}</div><div class="stat-label">已归档期数</div></div></div>
  </div>
  <div class="chips-row">
    <span class="chip${!filterPerson?' active':''}" onclick="setPersonFilter('')">全部</span>
    ${allPeople.map(n=>`<span class="chip${filterPerson===n?' active':''}" onclick="setPersonFilter('${esc(n)}')">${n}</span>`).join('')}
  </div>`;
  groups.forEach(g=>{
    const gdata=filtered.filter(p=>p.group===g);
    if(!gdata.length)return;
    const collapsed=collapsedGroups[g];
    html+=`<div class="gh" onclick="toggleGroup('${esc(g)}')">
      <span class="gh-title">${g}</span><span class="gh-count">${gdata.length} 人</span>
      <svg class="gh-arrow${collapsed?'':' open'}" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
    </div>`;
    if(!collapsed){
      html+=`<div class="cards-grid">`;
      gdata.forEach(p=>{
        const c=aColor(p.name);
        html+=`<div class="card" onclick="openDetail('${esc(p.name)}',${currentWeek})">
          <div class="card-header">
            <div class="av" style="background:${c}">${ini(p.name)}</div>
            <div>
              <div class="card-name">${p.name}</div>
              <div class="card-module">${p.module.replace(/\n/g,' · ')}</div>
            </div>
          </div>
          ${p.supportExec&&p.supportExec!=='/'?`<div style="margin-bottom:6px;">${p.supportExec.split('\n').map(e=>`<span class="tag-sm">支持 ${e}</span>`).join('')}</div>`:''}
          <div class="section-row">
            <div class="section-label">本周重点工作</div>
            <div class="section-text" id="st-${currentWeek}-${p.name}">${esc(p.weekly3).substring(0,200)}${p.weekly3.length>200?'…':''}</div>
            ${p.weekly3.length>100?`<span class="expand-btn" onclick="event.stopPropagation();openDetail('${esc(p.name)}',${currentWeek})">展开查看 ↗</span>`:''}
          </div>
          ${p.daily?`<div class="section-row"><div class="section-label">日常事务</div><div class="section-text">${esc(p.daily)}</div></div>`:''}
        </div>`;
      });
      html+=`</div>`;
    }
  });
  if(!filtered.length)html+=`<div class="empty">暂无匹配内容</div>`;
  document.getElementById('content').innerHTML=html;
}

function setPersonFilter(name){filterPerson=name;render();}
function toggleGroup(g){collapsedGroups[g]=!collapsedGroups[g];render();}

// ─── PERSONAL VIEW ───
function renderPersonal(){
  const allPeople=getAllPeople();
  if(!selectedPerson)selectedPerson=allPeople[0];
  let listHtml=allPeople.map(p=>{
    const c=aColor(p);
    return`<div class="person-list-item${p===selectedPerson?' active':''}" onclick="selectPerson('${esc(p)}')">
      <div class="av" style="background:${c};width:32px;height:32px;font-size:13px;">${ini(p)}</div>
      <div style="font-weight:600;font-size:13px;">${p}</div>
    </div>`;
  }).join('');
  const weekCount=REPORT_DATA.filter(w=>w.some(r=>r.name===selectedPerson)).length;
  const personGroup=getPersonGroup(selectedPerson);
  let detailHtml=`<div class="personal-stats">
    <div class="personal-stat"><div class="stat-icon purple">${svgDoc()}</div><div><div class="stat-value">${weekCount}</div><div class="stat-label">参与周报期数</div></div></div>
    <div class="personal-stat"><div class="stat-icon green">${svgPeople()}</div><div><div class="stat-value">${personGroup}</div><div class="stat-label">所属组别</div></div></div>
    <div class="personal-stat"><div class="stat-icon orange">${svgStar()}</div><div><div class="stat-value">${getPersonProjCount(selectedPerson)}</div><div class="stat-label">年度参与项目</div></div></div>
  </div>
  <div class="timeline-wrap">
    <div class="timeline-title">${svgClock()} 历史周报动态</div>`;
  const entries=REPORT_DATA.map((w,i)=>({week:WEEKS[i],entry:w.find(r=>r.name===selectedPerson)}))
    .filter(x=>x.entry).reverse();
  if(!entries.length){detailHtml+=`<div class="empty">暂无周报记录</div>`;}
  else{
    entries.forEach(({week,entry})=>{
      detailHtml+=`<div class="timeline-entry">
        <div class="timeline-week">${week.label}</div>
        <div class="timeline-section"><div class="timeline-section-label">本周重点</div><div class="timeline-text">${esc(entry.weekly3)}</div></div>
        ${entry.daily?`<div class="timeline-section" style="margin-top:10px;"><div class="timeline-section-label">日常事务</div><div class="timeline-text">${esc(entry.daily)}</div></div>`:''}
      </div>`;
    });
  }
  detailHtml+=`</div>`;
  document.getElementById('content').innerHTML=`<div class="personal-layout">
    <div class="person-list">${listHtml}</div>
    <div class="person-detail">${detailHtml}</div>
  </div>`;
}

function selectPerson(name){selectedPerson=name;render();}
function getAllPeople(){const s=new Set();REPORT_DATA.forEach(w=>w.forEach(r=>s.add(r.name)));return[...s];}
function getPersonGroup(name){for(const w of REPORT_DATA){const r=w.find(x=>x.name===name);if(r)return r.group;}return'';}
function getPersonProjCount(name){return annualProjects.filter(p=>p.owner===name||p.owner.includes(name)).length;}

  if(searchQ)projects=projects.filter(p=>p.name.includes(searchQ)||p.owner.includes(searchQ)||p.progress.includes(searchQ)||p.bg.includes(searchQ));
  let html=`<div class="annual-toolbar">
    <select class="filter-select" onchange="setAFilter('category',this.value)">
      <option value="">全部类别</option>
      ${categories.map(c=>`<option value="${esc(c)}"${annualFilters.category===c?' selected':''}>${c}</option>`).join('')}
    </select>
    <select class="filter-select" onchange="setAFilter('owner',this.value)">
      <option value="">全部负责人</option>
      ${owners.map(o=>`<option value="${esc(o)}"${annualFilters.owner===o?' selected':''}>${o}</option>`).join('')}
    </select>
    <select class="filter-select" onchange="setAFilter('status',this.value)">
      <option value="">全部状态</option>
      <option value="规划中"${annualFilters.status==='规划中'?' selected':''}>规划中</option>
      <option value="进行中"${annualFilters.status==='进行中'?' selected':''}>进行中</option>
      <option value="已完成"${annualFilters.status==='已完成'?' selected':''}>已完成</option>
      <option value="暂停"${annualFilters.status==='暂停'?' selected':''}>暂停</option>
    </select>
    <button class="btn btn-primary" onclick="openProjModal(null)" style="margin-left:auto;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> 新建项目
    </button>
  </div>`;
  const totals={running:projects.filter(p=>p.status==='进行中').length,done:projects.filter(p=>p.status==='已完成').length,planned:projects.filter(p=>p.status==='规划中').length};
  html+=`<div class="stats-bar" style="margin-bottom:16px;">
    <div class="stat-box"><div class="stat-icon purple">${svgDoc()}</div><div><div class="stat-value">${projects.length}</div><div class="stat-label">年度项目总数</div></div></div>
    <div class="stat-box"><div class="stat-icon blue">${svgStar()}</div><div><div class="stat-value">${totals.running}</div><div class="stat-label">进行中</div></div></div>
    <div class="stat-box"><div class="stat-icon green">${svgCalc()}</div><div><div class="stat-value">${totals.done}</div><div class="stat-label">已完成</div></div></div>
    <div class="stat-box"><div class="stat-icon orange">${svgPeople()}</div><div><div class="stat-value">${totals.planned}</div><div class="stat-label">规划中</div></div></div>
  </div>`;
  ['Q1','Q2','Q3','Q4'].forEach(q=>{
    const qp=projects.filter(p=>p.quarters.includes(q));
    if(!qp.length)return;
    html+=`<div class="quarter-section">
      <div class="quarter-header">
        <span class="quarter-label">${q}</span>
        <span class="quarter-count">${qp.length} 个项目</span>
      </div>
      <div class="proj-grid">
        ${qp.map(p=>`
          <div class="proj-card">
            <div class="proj-actions">
              <button class="icon-btn" onclick="event.stopPropagation();openProjModal(${p.id})" title="编辑">${svgEdit()}</button>
              <button class="icon-btn del" onclick="event.stopPropagation();deleteProj(${p.id})" title="删除">${svgTrash()}</button>
            </div>
            <div class="proj-name">${esc(p.name)}</div>
            <div class="proj-meta">${statusBadge(p.status)}${priBadge(p.priority)}<span class="tag-sm">${p.category}</span></div>
            <div class="proj-owner"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> ${esc(p.owner)}</div>
            ${p.progress?`<div class="proj-progress">${esc(p.progress)}</div>`:''}
          </div>`).join('')}
      </div>
    </div>`;
  });
  if(!projects.length)html+=`<div class="empty">暂无匹配项目</div>`;
  document.getElementById('content').innerHTML=html;
}

function setAFilter(k,v){annualFilters[k]=v;render();}

// ─── DETAIL MODAL ───
function openDetail(name,weekIdx){
  const p=REPORT_DATA[weekIdx].find(r=>r.name===name);
  if(!p)return;
  const c=aColor(p.name);
  document.getElementById('dm-av').style.background=c;
  document.getElementById('dm-av').textContent=ini(p.name);
  document.getElementById('dm-name').textContent=p.name;
  document.getElementById('dm-module').textContent=WEEKS[weekIdx].label+' · '+p.module.replace(/\n/g,' · ');
  let body='';
  if(p.supportExec&&p.supportExec!=='/')
    body+=`<div class="dm-section"><div class="dm-label">支持高管</div><div class="dm-text">${esc(p.supportExec)}</div></div>`;
  body+=`<div class="dm-section"><div class="dm-label">本周重点工作</div><div class="dm-text">${esc(p.weekly3)}</div></div>`;
  if(p.daily)body+=`<div class="dm-section"><div class="dm-label">日常事务</div><div class="dm-text">${esc(p.daily)}</div></div>`;
  if(p.next3)body+=`<div class="dm-section"><div class="dm-label">下周计划</div><div class="dm-text">${esc(p.next3)}</div></div>`;
  if(p.issues)body+=`<div class="dm-section"><div class="dm-label">问题/跨部门协作</div><div class="dm-text">${esc(p.issues)}</div></div>`;
  document.getElementById('dm-body').innerHTML=body;
  document.getElementById('detailModal').classList.remove('hidden');
}
function closeDetailModal(e){if(!e||e.target===document.getElementById('detailModal'))document.getElementById('detailModal').classList.add('hidden');}

// ─── PROJECT MODAL ───
function openProjModal(id){
  editingProject=id?annualProjects.find(p=>p.id===id):null;
  document.getElementById('projModalTitle').textContent=editingProject?'编辑项目':'新建项目';
  document.getElementById('pf-name').value=editingProject?editingProject.name:'';
  document.getElementById('pf-priority').value=editingProject?editingProject.priority:'P1';
  document.getElementById('pf-owner').value=editingProject?editingProject.owner:'耿博琳';
  document.getElementById('pf-category').value=editingProject?editingProject.category:'职场运营';
  document.getElementById('pf-status').value=editingProject?editingProject.status:'规划中';
  document.getElementById('pf-bg').value=editingProject?editingProject.bg:'';
  document.getElementById('pf-progress').value=editingProject?editingProject.progress:'';
  const qchecks=document.querySelectorAll('.q-check');
  qchecks.forEach(el=>{
    el.classList.toggle('selected',!!(editingProject&&editingProject.quarters.includes(el.dataset.q)));
  });
  document.getElementById('projModal').classList.remove('hidden');
}
function closeProjModal(e){if(!e||e.target===document.getElementById('projModal'))document.getElementById('projModal').classList.add('hidden');}
function toggleQ(el){el.classList.toggle('selected');}
function saveProject(){
  const name=document.getElementById('pf-name').value.trim();
  if(!name){alert('请填写项目名称');return;}
  const quarters=[...document.querySelectorAll('.q-check.selected')].map(el=>el.dataset.q);
  if(!quarters.length){alert('请选择至少一个执行季度');return;}
  const proj={
    id:editingProject?editingProject.id:nextProjId++,
    name,
    owner:document.getElementById('pf-owner').value,
    category:document.getElementById('pf-category').value,
    status:document.getElementById('pf-status').value,
    priority:document.getElementById('pf-priority').value,
    quarters,
    bg:document.getElementById('pf-bg').value.trim(),
    progress:document.getElementById('pf-progress').value.trim()
  };
  if(editingProject){
    const idx=annualProjects.findIndex(p=>p.id===editingProject.id);
    annualProjects[idx]=proj;
  }else{annualProjects.push(proj);}
  document.getElementById('projModal').classList.add('hidden');
  render();
}
function deleteProj(id){
  if(!confirm('确定删除该项目？'))return;
  annualProjects=annualProjects.filter(p=>p.id!==id);
  render();
}

// ─── NAV / WEEK / SEARCH ───
function switchWeek(i){
  currentWeek=i;
  document.querySelectorAll('.week-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  document.getElementById('topbar-title').textContent=WEEKS[i].label+' 行政周报';
  filterPerson='';render();
}
function prevWeek(){if(currentWeek>0)switchWeek(currentWeek-1);}
function nextWeek(){if(currentWeek<WEEKS.length-1)switchWeek(currentWeek+1);}
function onSearch(){searchQ=document.getElementById('searchInput').value.trim();render();}
function toggleSidebar(){
  const s=document.getElementById('sidebar');s.classList.toggle('collapsed');
}
function toggleDark(){
  const isDark=document.documentElement.classList.toggle('dark');
  document.getElementById('themeIcon').innerHTML=isDark
    ?'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    :'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
}

// ─── SVG HELPERS ───
function svgPeople(){return'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>';}
function svgCalc(){return'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';}
function svgStar(){return'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';}
function svgDoc(){return'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>';}
function svgClock(){return'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';}
function svgEdit(){return'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';}
function svgTrash(){return'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';}

// ─── INIT ───
render();
</script>
</body>
